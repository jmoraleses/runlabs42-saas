# Desactivado: producción solo desde `main` (ver vercel.json).
# Ejecutar manualmente solo si necesitas promover un preview antiguo.
name: Sync production from preview (manual)

on:
  workflow_dispatch:

concurrency:
  group: sync-production-preview
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (Vercel CLI)
        run: npm ci

      - name: Wait for Preview deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: runlabs42
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            list="$(npx vercel ls runlabs42 --token "$VERCEL_TOKEN" -S "$VERCEL_SCOPE" 2>/dev/null || true)"
            url="$(echo "$list" | awk '/Preview/ && /Ready/ { for (i=1;i<=NF;i++) if ($i ~ /^https:\/\//) { print $i; exit } }')"
            if [ -n "$url" ]; then
              echo "PREVIEW_URL=$url" >> "$GITHUB_ENV"
              echo "Found Ready preview: $url"
              exit 0
            fi
            echo "Waiting for preview build ($attempt/36)…"
            sleep 10
          done
          echo "Timed out waiting for a Ready Preview deployment." >&2
          exit 1

      - name: Promote to Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: runlabs42
        run: npx vercel promote "$PREVIEW_URL" --yes -S "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"

      - name: Point runlabs42.vercel.app at Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: runlabs42
        run: |
          set -euo pipefail
          list="$(npx vercel ls runlabs42 --token "$VERCEL_TOKEN" -S "$VERCEL_SCOPE")"
          prod="$(echo "$list" | awk '/Production/ && /Ready/ { for (i=1;i<=NF;i++) if ($i ~ /^https:\/\//) { print $i; exit } }')"
          npx vercel alias set "$prod" runlabs42.vercel.app -S "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
